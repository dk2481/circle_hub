<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Circle Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
/* ── tokens ── */
:root {
  --D: 560px;
  --bg: #060609;
  --t0: #fff;
  --t1: rgba(255,255,255,.46);
  --t2: rgba(255,255,255,.2);
  --e: cubic-bezier(.32,.72,0,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;background:#000;
  font-family:-apple-system,'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
  user-select:none;touch-action:none;overflow:hidden;
}

/* ── outer shell ── */
#shell{
  width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:#000;
}

/* ── premium bezel ── */
.bezel{
  width:calc(var(--D)+20px);height:calc(var(--D)+20px);
  border-radius:50%;padding:10px;flex-shrink:0;
  background:
    radial-gradient(circle at 38% 26%,#252525 0%,#0e0e0e 40%,#1c1c1c 100%);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.055),
    0 70px 220px rgba(0,0,0,1),
    inset 0 1px 0 rgba(255,255,255,.10),
    inset 0 -1px 2px rgba(0,0,0,.9);
}

/* ── round screen ── */
.screen{
  width:var(--D);height:var(--D);
  border-radius:50%;overflow:hidden;
  position:relative;background:var(--bg);
}
/* glare overlay */
.screen::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  z-index:9999;pointer-events:none;
  background:radial-gradient(ellipse at 33% 17%,rgba(255,255,255,.045) 0%,transparent 46%);
}

/* ── views ── */
.view{
  position:absolute;inset:0;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;transform:scale(.92);
  transition:opacity .42s var(--e),transform .42s var(--e);
  pointer-events:none;
}
.view.active{opacity:1;transform:scale(1);pointer-events:all;z-index:10}
.view.ol{opacity:0;transform:translateX(-5%) scale(.96);transition:opacity .3s,transform .3s}
.view.or{opacity:0;transform:translateX( 5%) scale(.96);transition:opacity .3s,transform .3s}

/* ── arc nav dots (bottom arc, 5 dots) ── */
#nav{position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:900;transition:opacity .3s}
.nd{
  position:absolute;top:50%;left:50%;
  width:4px;height:4px;border-radius:50%;
  background:rgba(255,255,255,.2);
  transform:translate(-50%,-50%);
  transition:all .3s var(--e);
  pointer-events:all;cursor:pointer;
}
.nd::before{content:'';position:absolute;inset:-10px;border-radius:50%}
.nd.on{
  background:rgba(255,255,255,.85);
  width:6px;height:6px;
  box-shadow:0 0 6px rgba(255,255,255,.4);
}

/* ════════════════════════════
   V0 · CLOCK  (standby)
════════════════════════════ */
#v0{
  background:radial-gradient(ellipse at 50% 50%,#0b0b16 0%,#040406 100%);
  cursor:pointer;
}
.v0-amb{
  position:absolute;inset:0;border-radius:50%;pointer-events:none;
  background:
    radial-gradient(ellipse at 36% 30%,rgba(74,158,255,.08) 0%,transparent 52%),
    radial-gradient(ellipse at 66% 70%,rgba(191,90,242,.05) 0%,transparent 52%);
  animation:amb 13s ease-in-out infinite alternate;
}
@keyframes amb{from{transform:scale(1)}to{transform:scale(1.09) rotate(11deg)}}

.v0-time{
  font-size:94px;font-weight:200;letter-spacing:-7px;
  color:var(--t0);z-index:2;line-height:1;
  text-shadow:0 0 80px rgba(74,158,255,.15);
}
.v0-date{font-size:11px;color:var(--t1);margin-top:6px;z-index:2;letter-spacing:.3px}
.v0-hint{
  position:absolute;bottom:19%;font-size:9px;letter-spacing:3px;
  text-transform:uppercase;color:var(--t2);z-index:2;
  animation:blink 3s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:.15}50%{opacity:.6}}

/* ════════════════════════════
   V1 · TEMPERATURE  (Nest-style)
   Arc: 270°, r=254, starts bottom-left (CSS 225°)
   SVG: rotate(135 280 280) on 560×560 viewbox
════════════════════════════ */
#v1{background:var(--bg)}

/* Atmospheric glow (changes with mode/state) */
.v1-glow{
  position:absolute;inset:0;border-radius:50%;
  pointer-events:none;z-index:0;
  transition:background 1.4s ease;
}

/* shared ring SVG */
.rsvg{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:1;
}

/* centre readout */
.v1-set{
  font-size:80px;font-weight:200;letter-spacing:-5px;
  color:var(--t0);z-index:3;line-height:1;
  display:flex;align-items:flex-start;
}
.v1-unit{font-size:24px;font-weight:200;color:var(--t1);margin-top:12px}
/* two-line sub: current room + mode */
.v1-now{font-size:11px;color:var(--t1);z-index:3;margin-top:7px;letter-spacing:.4px}
.v1-mode{
  font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--t2);z-index:3;margin-top:4px;
  transition:color .6s;
}

/* 3 mode buttons — placed radially inside arc near bottom */
.v1-m{
  position:absolute;z-index:4;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;
  transform:translate(-50%,-50%);
  transition:background .2s,border-color .2s,transform .18s var(--e);
}
.v1-m:active{transform:translate(-50%,-50%) scale(.85)}
.v1-m.on{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.22)}

/* ════════════════════════════
   V2 · AMBIANCE  (lights)
   same arc geometry as V1
════════════════════════════ */
#v2{background:var(--bg)}
.v2-glow{position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:0;transition:background .9s ease}
.v2-pct{
  font-size:76px;font-weight:200;letter-spacing:-4px;
  color:var(--t0);z-index:3;line-height:1;
  display:flex;align-items:flex-end;
}
.v2-punit{font-size:18px;font-weight:300;color:var(--t1);margin-bottom:10px;margin-left:2px}
.v2-scene{font-size:10px;color:var(--t1);z-index:3;margin-top:7px;letter-spacing:1.2px;text-transform:uppercase}

/* 4 scene buttons, same placement pattern */
.v2-s{
  position:absolute;z-index:4;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;
  transform:translate(-50%,-50%);
  transition:background .2s,border-color .2s,transform .18s var(--e);
}
.v2-s:active{transform:translate(-50%,-50%) scale(.85)}
.v2-s.on{background:rgba(251,191,36,.18);border-color:rgba(251,191,36,.32)}

/* ════════════════════════════
   V3 · MUSIC
   Thin progress ring at outer edge, no buttons visible until tap
════════════════════════════ */
#v3{background:var(--bg)}
.v3-bg{position:absolute;inset:0;border-radius:50%;opacity:.42;z-index:0;transition:background 2.2s ease}
.v3-psvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2}
.v3-trk{fill:none;stroke:rgba(255,255,255,.05)}
.v3-fill{fill:none;stroke:rgba(255,255,255,.38);stroke-linecap:round;transition:stroke-dashoffset .5s linear}

.v3-title{
  font-size:18px;font-weight:500;color:var(--t0);
  z-index:3;max-width:62%;text-align:center;line-height:1.35;
}
.v3-artist{font-size:11px;color:var(--t1);z-index:3;margin-top:4px}
.v3-play{
  width:54px;height:54px;border-radius:50%;
  background:rgba(255,255,255,.92);color:var(--bg);
  font-size:16px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:3;margin-top:18px;
  box-shadow:0 4px 28px rgba(0,0,0,.55);
  transition:transform .18s var(--e);
  font-family:inherit;
}
.v3-play:active{transform:scale(.86)}

/* ════════════════════════════
   V4 · STATUS  (security)
════════════════════════════ */
#v4{background:var(--bg)}
.v4-glow{position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:0;transition:background .9s ease}
.v4-rsvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
.v4-ring{fill:none;stroke-width:1;transition:stroke .9s ease}
.v4-icon{font-size:60px;z-index:3}
.v4-title{font-size:17px;font-weight:600;color:var(--t0);z-index:3;margin-top:8px;letter-spacing:-.3px}
.v4-sub{font-size:10px;color:var(--t1);z-index:3;margin-top:3px}
.v4-btn{
  margin-top:20px;z-index:3;font-family:inherit;
  padding:10px 28px;border-radius:24px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);color:var(--t1);
  font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.4px;
  transition:all .2s;
}
.v4-btn:active{transform:scale(.91)}
.v4-btn.disarm{border-color:rgba(255,69,58,.28);background:rgba(255,69,58,.07);color:#FF453A}
.v4-btn.arm{border-color:rgba(48,209,88,.28);background:rgba(48,209,88,.07);color:#30D158}

/* ── responsive ── */
@media(max-width:640px){
  :root{--D:min(90vw,90vh)}
  .bezel{width:calc(var(--D)+min(3.5vw,20px));height:calc(var(--D)+min(3.5vw,20px));padding:min(1.8vw,10px)}
  .v0-time{font-size:clamp(54px,15vw,94px)}
  .v1-set{font-size:clamp(52px,13vw,80px)}
  .v2-pct{font-size:clamp(50px,12.5vw,76px)}
}
</style>
</head>
<body>
<div id="shell">
<div class="bezel">
<div class="screen" id="screen">

<!-- ═══ V0 · CLOCK ═══ -->
<div class="view active" id="v0">
  <div class="v0-amb"></div>
  <div class="v0-time" id="v0t">00:00</div>
  <div class="v0-date" id="v0d"></div>
  <div class="v0-hint">tap to wake</div>
</div>

<!-- ═══ V1 · TEMPERATURE ═══ -->
<div class="view" id="v1">
  <div class="v1-glow" id="v1g"></div>
  <svg class="rsvg" viewBox="0 0 560 560" id="v1svg">
    <!-- Track 270° arc, r=254, rotate(135) starts at CSS 225° (bottom-left) -->
    <circle id="v1trk" cx="280" cy="280" r="254"
      fill="none" stroke="rgba(255,255,255,.05)" stroke-width="5"
      stroke-linecap="round"/>
    <!-- Fill arc -->
    <circle id="v1arc" cx="280" cy="280" r="254"
      fill="none" stroke-width="5" stroke-linecap="round"
      style="transition:stroke-dashoffset .12s linear,stroke .7s ease"/>
    <!-- Drag handle -->
    <circle id="v1dot" cx="280" cy="280" r="9"
      fill="white" style="filter:drop-shadow(0 2px 10px rgba(0,0,0,.75));cursor:grab"/>
    <!-- Arc-end tick marks -->
    <circle id="tA" r="3" fill="rgba(255,255,255,.25)"/>
    <circle id="tB" r="3" fill="rgba(255,255,255,.25)"/>
  </svg>
  <div class="v1-set"><span id="v1n">24</span><span class="v1-unit">°</span></div>
  <div class="v1-now" id="v1now">Room 22°</div>
  <div class="v1-mode" id="v1mode">Cooling</div>
  <!-- 3 mode buttons placed radially (by JS) -->
  <div class="v1-m" id="m-cool" data-m="cool" onclick="setMode(this)">🌬️</div>
  <div class="v1-m" id="m-eco"  data-m="eco"  onclick="setMode(this)">🍃</div>
  <div class="v1-m" id="m-heat" data-m="heat" onclick="setMode(this)">🔥</div>
</div>

<!-- ═══ V2 · AMBIANCE ═══ -->
<div class="view" id="v2">
  <div class="v2-glow" id="v2g"></div>
  <svg class="rsvg" viewBox="0 0 560 560" id="v2svg">
    <circle id="v2trk" cx="280" cy="280" r="254"
      fill="none" stroke="rgba(255,255,255,.05)" stroke-width="5"
      stroke-linecap="round"/>
    <circle id="v2arc" cx="280" cy="280" r="254"
      fill="none" stroke="#FBBF24" stroke-width="5" stroke-linecap="round"
      style="transition:stroke-dashoffset .12s linear"/>
    <circle id="v2dot" cx="280" cy="280" r="9"
      fill="white" style="filter:drop-shadow(0 2px 10px rgba(0,0,0,.75));cursor:grab"/>
  </svg>
  <div class="v2-pct"><span id="v2n">75</span><span class="v2-punit">%</span></div>
  <div class="v2-scene" id="v2sc">Reading</div>
  <!-- 4 scene buttons placed radially (by JS) -->
  <div class="v2-s on"  data-sc="Reading" data-brt="65"  onclick="setScene(this)">📖</div>
  <div class="v2-s"     data-sc="Movie"   data-brt="28"  onclick="setScene(this)">🎬</div>
  <div class="v2-s"     data-sc="Relax"   data-brt="22"  onclick="setScene(this)">🌙</div>
  <div class="v2-s"     data-sc="Bright"  data-brt="100" onclick="setScene(this)">☀️</div>
</div>

<!-- ═══ V3 · MUSIC ═══ -->
<div class="view" id="v3">
  <div class="v3-bg" id="v3bg"></div>
  <svg class="v3-psvg" viewBox="0 0 560 560">
    <circle class="v3-trk" cx="280" cy="280" r="270" stroke-width="2"/>
    <circle class="v3-fill" cx="280" cy="280" r="270" stroke-width="2"
      transform="rotate(-90 280 280)"
      id="v3prog"
      stroke-dasharray="1696.5 1696.5" stroke-dashoffset="1696.5"/>
  </svg>
  <div class="v3-title"  id="v3t">Clair de Lune</div>
  <div class="v3-artist" id="v3a">Debussy</div>
  <button class="v3-play" id="v3p" onclick="togglePlay()">▶</button>
</div>

<!-- ═══ V4 · STATUS ═══ -->
<div class="view" id="v4">
  <div class="v4-glow" id="v4g"
    style="background:radial-gradient(ellipse at 50% 44%,rgba(48,209,88,.10) 0%,transparent 60%)"></div>
  <svg class="v4-rsvg" viewBox="0 0 560 560">
    <circle class="v4-ring" id="v4ring" cx="280" cy="280" r="264"
      stroke="rgba(48,209,88,.14)"/>
  </svg>
  <div class="v4-icon"  id="v4i">🔒</div>
  <div class="v4-title" id="v4ti">Armed</div>
  <div class="v4-sub"   id="v4sb">All sensors normal</div>
  <button class="v4-btn disarm" id="v4btn" onclick="toggleArm()">Disarm</button>
</div>

<!-- ═══ ARC NAV DOTS ═══ -->
<div id="nav" style="opacity:0">
  <div class="nd on" data-i="0" onclick="go(0)"></div>
  <div class="nd"    data-i="1" onclick="go(1)"></div>
  <div class="nd"    data-i="2" onclick="go(2)"></div>
  <div class="nd"    data-i="3" onclick="go(3)"></div>
  <div class="nd"    data-i="4" onclick="go(4)"></div>
</div>

</div><!-- /screen -->
</div><!-- /bezel -->
</div><!-- /shell -->

<script>
/* ════════════════════════════════════
   ARC CONSTANTS  (560×560 SVG, r=254)
   SVG rotate(135 280 280) → arc starts CSS 225° (7:30 / bottom-left)
   Goes CW 270° → ends CSS 135° (4:30 / bottom-right)
════════════════════════════════════ */
const AR = 254;        // arc radius in SVG units
const CX = 280, CY = 280;  // SVG centre
const START_DEG = 225; // CSS convention: 0°=top, CW
const SPAN_DEG  = 270;
const ARC_C     = 2 * Math.PI * AR;
const ARC_LEN   = ARC_C * (SPAN_DEG / 360); // 270° portion
const ARC_GAP   = ARC_C - ARC_LEN;
const DA        = `${ARC_LEN.toFixed(2)} ${ARC_GAP.toFixed(2)}`;
const ROT_ATTR  = `rotate(135 ${CX} ${CY})`;

/* Convert fraction [0–1] → SVG (x,y) on the arc */
function fToXY(f) {
  const deg = START_DEG + f * SPAN_DEG;
  const rad = (deg - 90) * Math.PI / 180;
  return { x: CX + AR * Math.cos(rad), y: CY + AR * Math.sin(rad) };
}

/* Convert fraction → stroke-dashoffset (0=full arc, ARC_LEN=empty) */
function fToOff(f) {
  return ARC_LEN * (1 - Math.max(0, Math.min(1, f)));
}

/* Pointer event → fraction along arc */
function pToFrac(e, svg) {
  const rect  = svg.getBoundingClientRect();
  const scale = 560 / rect.width;
  const px = e.touches ? e.touches[0].clientX : e.clientX;
  const py = e.touches ? e.touches[0].clientY : e.clientY;
  const sx = (px - rect.left) * scale - CX;
  const sy = (py - rect.top)  * scale - CY;
  let deg = Math.atan2(sy, sx) * (180 / Math.PI) + 90;
  if (deg < 0) deg += 360;
  let d = deg - START_DEG;
  if (d < 0) d += 360;
  // If pointer is in the gap (below bottom-left to bottom-right shortcut area)
  if (d > SPAN_DEG + 10) d = d > SPAN_DEG + (360 - SPAN_DEG) / 2 ? 0 : SPAN_DEG;
  return Math.max(0, Math.min(1, d / SPAN_DEG));
}

/* Is pointer near the arc edge? (drag zone) */
function nearArc(e, svg) {
  const rect  = svg.getBoundingClientRect();
  const scale = 560 / rect.width;
  const px = e.touches ? e.touches[0].clientX : e.clientX;
  const py = e.touches ? e.touches[0].clientY : e.clientY;
  const sx = (px - rect.left) * scale - CX;
  const sy = (py - rect.top)  * scale - CY;
  const d  = Math.sqrt(sx * sx + sy * sy);
  return d > AR - 58 && d < AR + 58;
}

/* Init an arc: set dasharray + rotation on track and fill circles */
function initArc(trkId, fillId) {
  const trk  = document.getElementById(trkId);
  const fill = document.getElementById(fillId);
  trk.setAttribute('stroke-dasharray', DA);
  trk.setAttribute('transform', ROT_ATTR);
  fill.setAttribute('stroke-dasharray', DA);
  fill.setAttribute('transform', ROT_ATTR);
  fill.setAttribute('stroke-dashoffset', ARC_LEN.toFixed(2)); // empty initially
}

/* Update arc fill + handle dot */
function updateArc(fillId, dotId, frac) {
  document.getElementById(fillId).setAttribute('stroke-dashoffset', fToOff(frac).toFixed(2));
  const p = fToXY(frac);
  document.getElementById(dotId).setAttribute('cx', p.x.toFixed(2));
  document.getElementById(dotId).setAttribute('cy', p.y.toFixed(2));
}

/* Attach drag handlers to an SVG, call cb(frac) on drag */
function attachDrag(svgId, cb) {
  const svg = document.getElementById(svgId);
  let active = false;
  svg.addEventListener('mousedown',  e => { if (nearArc(e, svg)) { active=true; e.preventDefault(); cb(pToFrac(e,svg)); } }, {passive:false});
  svg.addEventListener('touchstart', e => { if (nearArc(e, svg)) { active=true; e.preventDefault(); cb(pToFrac(e,svg)); } }, {passive:false});
  document.addEventListener('mousemove',  e => { if (active) { e.preventDefault(); cb(pToFrac(e,svg)); } }, {passive:false});
  document.addEventListener('touchmove',  e => { if (active) { e.preventDefault(); cb(pToFrac(e,svg)); } }, {passive:false});
  document.addEventListener('mouseup',  () => active=false);
  document.addEventListener('touchend', () => active=false);
}

/* ════════════════════════════════════
   TEMPERATURE  (V1)
════════════════════════════════════ */
const CLIM = { temp:24, min:16, max:30, mode:'cool' };
const MODES = {
  cool:{ stroke:'#4A9EFF', glow:'rgba(74,158,255,.16)',  label:'Cooling' },
  eco: { stroke:'#30D158', glow:'rgba(48,209,88,.14)',   label:'Eco' },
  heat:{ stroke:'#FF8C42', glow:'rgba(255,140,66,.17)',  label:'Heating' },
};

initArc('v1trk','v1arc');

/* Position arc-end tick marks */
(function(){
  const a = fToXY(0), b = fToXY(1);
  document.getElementById('tA').setAttribute('cx', a.x.toFixed(2));
  document.getElementById('tA').setAttribute('cy', a.y.toFixed(2));
  document.getElementById('tB').setAttribute('cx', b.x.toFixed(2));
  document.getElementById('tB').setAttribute('cy', b.y.toFixed(2));
})();

/* Position 3 mode buttons radially inside arc near bottom */
(function(){
  // At r≈195, spread at CSS 215°, 180°, 145° (flanking bottom)
  const angs  = [215, 180, 145];
  const btns  = ['m-cool','m-eco','m-heat'];
  const r     = 195, half = 560/2; // canvas half = 280px
  btns.forEach((id,i) => {
    const rad = (angs[i] - 90) * Math.PI / 180;
    const x = half + r * Math.cos(rad);
    const y = half + r * Math.sin(rad);
    const el = document.getElementById(id);
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
  });
})();

function renderClim() {
  const f = (CLIM.temp - CLIM.min) / (CLIM.max - CLIM.min);
  const m = MODES[CLIM.mode];
  document.getElementById('v1arc').setAttribute('stroke', m.stroke);
  document.getElementById('v1n').textContent   = CLIM.temp;
  document.getElementById('v1mode').textContent = m.label;
  document.getElementById('v1g').style.background =
    `radial-gradient(ellipse at 50% 42%,${m.glow} 0%,transparent 66%)`;
  updateArc('v1arc','v1dot', f);
}

attachDrag('v1svg', f => {
  CLIM.temp = Math.round(CLIM.min + f * (CLIM.max - CLIM.min));
  renderClim();
});

/* Highlight active mode button */
function highlightMode() {
  ['m-cool','m-eco','m-heat'].forEach(id => {
    document.getElementById(id).classList.toggle('on', document.getElementById(id).dataset.m === CLIM.mode);
  });
}
function setMode(el) {
  CLIM.mode = el.dataset.m;
  highlightMode();
  renderClim();
}

renderClim();
highlightMode();

/* ════════════════════════════════════
   AMBIANCE / LIGHTS  (V2)
════════════════════════════════════ */
const LGHT = { brt:75 };

initArc('v2trk','v2arc');

/* Position 4 scene buttons radially near bottom, at r≈200 */
(function(){
  const angs = [222, 202, 158, 138]; // left→right bottom arc
  const ids  = document.querySelectorAll('.v2-s');
  const r = 200, half = 280;
  ids.forEach((el,i) => {
    const rad = (angs[i] - 90) * Math.PI / 180;
    el.style.left = (half + r * Math.cos(rad)) + 'px';
    el.style.top  = (half + r * Math.sin(rad)) + 'px';
  });
})();

function renderLight() {
  const f = LGHT.brt / 100;
  const a = 0.05 + f * 0.22;
  document.getElementById('v2n').textContent  = LGHT.brt;
  document.getElementById('v2g').style.background =
    `radial-gradient(ellipse at 50% 44%,rgba(251,191,36,${a.toFixed(3)}) 0%,transparent 64%)`;
  updateArc('v2arc','v2dot', f);
}

attachDrag('v2svg', f => {
  LGHT.brt = Math.round(f * 100);
  renderLight();
});

function setScene(el) {
  document.querySelectorAll('.v2-s').forEach(s => s.classList.remove('on'));
  el.classList.add('on');
  LGHT.brt = parseInt(el.dataset.brt);
  document.getElementById('v2sc').textContent = el.dataset.sc;
  renderLight();
}

renderLight();

/* ════════════════════════════════════
   MUSIC  (V3)
   Swipe left/right on this screen = prev/next
════════════════════════════════════ */
const TRACKS = [
  {t:'Clair de Lune',   a:'Debussy',    d:303, bg:'radial-gradient(ellipse at 44% 36%,rgba(74,158,255,.58) 0%,rgba(191,90,242,.3) 55%,transparent 80%)'},
  {t:'Bohemian Rhap.',  a:'Queen',      d:355, bg:'radial-gradient(ellipse at 56% 34%,rgba(239,68,68,.52) 0%,rgba(245,158,11,.27) 60%,transparent 80%)'},
  {t:'Blinding Lights', a:'The Weeknd', d:200, bg:'radial-gradient(ellipse at 50% 50%,rgba(191,90,242,.55) 0%,rgba(74,158,255,.22) 60%,transparent 80%)'},
  {t:'Love Poem',       a:'IU',         d:286, bg:'radial-gradient(ellipse at 40% 58%,rgba(236,72,153,.5) 0%,rgba(191,90,242,.24) 60%,transparent 80%)'},
];
const MUS = {i:0, sec:45, play:false};
let mTimer=null;
const MPROG_C = 2 * Math.PI * 270; // r=270 on 560 SVG → C≈1696.5

function getTrk(){return TRACKS[MUS.i%TRACKS.length]}
function renderMusic(){
  const t=getTrk();
  document.getElementById('v3t').textContent=t.t;
  document.getElementById('v3a').textContent=t.a;
  document.getElementById('v3bg').style.background=t.bg;
  renderProg();
}
function renderProg(){
  const p=MUS.sec/getTrk().d;
  document.getElementById('v3prog').setAttribute('stroke-dashoffset',(MPROG_C*(1-p)).toFixed(2));
}
function togglePlay(){
  MUS.play=!MUS.play;
  document.getElementById('v3p').textContent=MUS.play?'⏸':'▶';
  if(MUS.play){
    mTimer=setInterval(()=>{MUS.sec=(MUS.sec+1)%getTrk().d;renderProg()},1000);
  }else{clearInterval(mTimer)}
}
function prevTrk(){MUS.i=(MUS.i-1+TRACKS.length)%TRACKS.length;MUS.sec=0;renderMusic()}
function nextTrk(){MUS.i=(MUS.i+1)%TRACKS.length;MUS.sec=0;renderMusic()}
renderMusic();

/* ════════════════════════════════════
   SECURITY  (V4)
════════════════════════════════════ */
let armed=true;
function toggleArm(){
  armed=!armed;
  document.getElementById('v4g').style.background=armed
    ?'radial-gradient(ellipse at 50% 44%,rgba(48,209,88,.10) 0%,transparent 60%)'
    :'radial-gradient(ellipse at 50% 44%,rgba(255,69,58,.13) 0%,transparent 60%)';
  document.getElementById('v4ring').setAttribute('stroke',
    armed?'rgba(48,209,88,.14)':'rgba(255,69,58,.16)');
  document.getElementById('v4i').textContent  = armed?'🔒':'🔓';
  document.getElementById('v4ti').textContent = armed?'Armed':'Disarmed';
  document.getElementById('v4sb').textContent = armed?'All sensors normal':'Security off';
  const b=document.getElementById('v4btn');
  b.textContent=armed?'Disarm':'Arm';
  b.className=armed?'v4-btn disarm':'v4-btn arm';
}

/* ════════════════════════════════════
   CLOCK
════════════════════════════════════ */
(function clock(){
  const n=new Date();
  document.getElementById('v0t').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  const D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('v0d').textContent=D[n.getDay()]+', '+M[n.getMonth()]+' '+n.getDate();
  setTimeout(clock,1000);
})();

/* ════════════════════════════════════
   ARD NAV DOTS POSITION
   5 dots centred around 180° (bottom), r=87% of screen radius
════════════════════════════════════ */
(function(){
  const scr=document.getElementById('screen');
  const R=scr.offsetWidth/2;
  const dr=R*.878;
  // angles: tight cluster at bottom
  const angs=[164,172,180,188,196];
  document.querySelectorAll('.nd').forEach((d,i)=>{
    const rad=(angs[i]-90)*Math.PI/180;
    d.style.marginLeft=(dr*Math.cos(rad))+'px';
    d.style.marginTop =(dr*Math.sin(rad))+'px';
  });
})();

/* ════════════════════════════════════
   NAVIGATION
════════════════════════════════════ */
const VIDS=['v0','v1','v2','v3','v4'];
let cur=0;

document.getElementById('v0').addEventListener('click',()=>go(1));

function go(i){
  if(i===cur)return;
  const pe=document.getElementById(VIDS[cur]);
  const ne=document.getElementById(VIDS[i]);
  const d=i>cur?'ol':'or';
  pe.classList.remove('active');
  pe.classList.add(d);
  setTimeout(()=>pe.classList.remove('ol','or'),360);
  cur=i;
  ne.classList.add('active');
  document.querySelectorAll('.nd').forEach(d=>d.classList.toggle('on',+d.dataset.i===i));
  document.getElementById('nav').style.opacity=i===0?'0':'1';
}

/* ════════════════════════════════════
   SWIPE  (left/right to navigate; on music screen also changes track)
════════════════════════════════════ */
let sx=0,sy=0;
document.getElementById('screen').addEventListener('touchstart',e=>{
  sx=e.touches[0].clientX;sy=e.touches[0].clientY;
},{passive:true});
document.getElementById('screen').addEventListener('touchend',e=>{
  if(cur===0)return;
  const dx=e.changedTouches[0].clientX-sx;
  const dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>44){
    if(cur===3){
      // music screen: swipe changes track
      dx<0?nextTrk():prevTrk();
    }else{
      if(dx<0&&cur<VIDS.length-1)go(cur+1);
      else if(dx>0&&cur>1)go(cur-1);
    }
  }
},{passive:true});
</script>
</body>
