<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Circle Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root{--D:560px;--bg:#060609;--t0:#fff;--t1:rgba(255,255,255,.46);--t2:rgba(255,255,255,.2);--e:cubic-bezier(.32,.72,0,1);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;font-family:-apple-system,'Inter',sans-serif;-webkit-font-smoothing:antialiased;user-select:none;touch-action:none;overflow:hidden;}
#shell{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:#000;}
.bezel{width:calc(var(--D)+20px);height:calc(var(--D)+20px);border-radius:50%;padding:10px;flex-shrink:0;background:radial-gradient(circle at 38% 26%,#252525 0%,#0e0e0e 40%,#1c1c1c 100%);box-shadow:0 0 0 1px rgba(255,255,255,.055),0 70px 220px rgba(0,0,0,1),inset 0 1px 0 rgba(255,255,255,.10),inset 0 -1px 2px rgba(0,0,0,.9);}
.screen{width:var(--D);height:var(--D);border-radius:50%;overflow:hidden;position:relative;background:#060609;}

/* ── views ── */
.view{position:absolute;inset:0;border-radius:50%;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .5s var(--e),transform .5s var(--e);transform:translateX(60px);pointer-events:none;}
.view.act{opacity:1;transform:none;pointer-events:auto;}
.view.out{opacity:0;transform:translateX(-60px);}

/* ── nav dots ── */
#nav{position:absolute;bottom:68px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:10;transition:opacity .4s;}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .3s,transform .3s;}
.dot.on{background:#fff;transform:scale(1.35);}

/* ══════════════ V0 CLOCK ══════════════ */
#v0{background:radial-gradient(ellipse at 40% 35%,#0d0d18 0%,#060609 70%);}
#v0 .time{font-size:88px;font-weight:200;letter-spacing:-4px;color:#fff;line-height:1;}
#v0 .date{font-size:14px;font-weight:300;letter-spacing:.12em;color:var(--t1);margin-top:10px;text-transform:uppercase;}

/* ══════════════ V1 TEMPERATURE ══════════════ */
#v1{background:radial-gradient(ellipse at 40% 35%,#0d1018 0%,#060609 70%);}
#v1 .arc-wrap{position:absolute;inset:0;}
#v1 .temp-val{font-size:82px;font-weight:200;letter-spacing:-3px;color:#fff;line-height:1;}
#v1 .temp-unit{font-size:22px;font-weight:300;color:var(--t1);margin-top:4px;}
#v1 .temp-info{display:flex;gap:20px;margin-top:16px;}
#v1 .temp-info span{font-size:11px;font-weight:400;color:var(--t2);letter-spacing:.06em;}
#v1 .temp-info span b{display:block;font-size:13px;font-weight:400;color:var(--t1);margin-top:2px;}
#v1 .swipe-hint{font-size:11px;color:var(--t2);margin-top:20px;letter-spacing:.08em;}

/* ══════════════ V2 HUMIDITY ══════════════ */
#v2{background:radial-gradient(ellipse at 40% 35%,#0a1015 0%,#060609 70%);}
#v2 .hum-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
#v2 .hum-icon{font-size:52px;line-height:1;}
#v2 .hum-val{font-size:80px;font-weight:200;letter-spacing:-3px;color:#fff;line-height:1;}
#v2 .hum-unit{font-size:18px;font-weight:300;color:var(--t1);}
#v2 .hum-status{font-size:14px;font-weight:400;letter-spacing:.12em;text-transform:uppercase;margin-top:6px;}
#v2 .hum-desc{font-size:11px;color:var(--t2);margin-top:8px;letter-spacing:.06em;}
/* arc glow for humidity */
#v2 .arc-wrap{position:absolute;inset:0;}

/* ══════════════ V3 MUSIC ══════════════ */
#v3{background:#060609;overflow:hidden;}
/* animated background blobs */
#v3 .blobs{position:absolute;inset:0;pointer-events:none;z-index:0;}
#v3 .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18;animation:blobmove 8s ease-in-out infinite;}
#v3 .blob:nth-child(1){width:260px;height:260px;background:#4A9EFF;top:-40px;left:-40px;animation-delay:0s;}
#v3 .blob:nth-child(2){width:200px;height:200px;background:#b06bff;bottom:-30px;right:-30px;animation-delay:-3s;}
#v3 .blob:nth-child(3){width:180px;height:180px;background:#ff6b9d;bottom:40px;left:20px;animation-delay:-5s;}
@keyframes blobmove{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(30px,-20px) scale(1.1);}66%{transform:translate(-20px,25px) scale(.92);}}

#v3 .lp-wrap{position:relative;z-index:1;width:216px;height:216px;}
#v3 svg#lp{width:216px;height:216px;}

/* LP disc spin */
#v3disc{transform-box:fill-box;transform-origin:center center;}
#v3disc.spinning{animation:lp-spin 2s linear infinite;}
@keyframes lp-spin{to{transform:rotate(360deg);}}

#v3 .track-info{position:relative;z-index:1;text-align:center;margin-top:18px;}
#v3 .track-title{font-size:16px;font-weight:400;color:#fff;letter-spacing:.02em;}
#v3 .track-artist{font-size:12px;font-weight:300;color:var(--t1);margin-top:4px;}
#v3 .swipe-hint{font-size:10px;color:var(--t2);margin-top:14px;letter-spacing:.08em;}

/* ══════════════ V4 LIGHTING ══════════════ */
#v4{background:#060609;}
#v4 .light-glow{position:absolute;width:260px;height:260px;border-radius:50%;filter:blur(90px);opacity:0;transition:opacity .6s,background .6s;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0;}
#v4 .light-glow.on{opacity:.35;}
#v4 .light-center{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
#v4 .light-icon{font-size:46px;line-height:1;}
#v4 .light-status{font-size:13px;font-weight:300;letter-spacing:.1em;color:var(--t1);margin-top:10px;text-transform:uppercase;}
#v4 .light-brightness{font-size:40px;font-weight:200;color:#fff;letter-spacing:-1px;margin-top:6px;}
#v4 .light-mode-label{font-size:11px;font-weight:400;letter-spacing:.1em;color:var(--t2);margin-top:4px;text-transform:uppercase;}
#v4 .arc-wrap{position:absolute;inset:0;}
/* mode buttons on arc */
.mode-btn{cursor:pointer;transition:opacity .2s;}
.mode-btn text{pointer-events:none;}
</style>
</head>
<body>
<div id="shell">
<div class="bezel">
<div class="screen" id="screen">

  <!-- V0 CLOCK -->
  <div class="view act" id="v0">
    <div class="time" id="clk">00:00</div>
    <div class="date" id="dat"></div>
  </div>

  <!-- V1 TEMPERATURE -->
  <div class="view" id="v1">
    <svg class="arc-wrap" viewBox="0 0 560 560" id="v1svg">
      <circle cx="280" cy="280" r="254" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="3"
        stroke-dasharray="1342.2 1675.5" stroke-linecap="round"
        transform="rotate(135 280 280)"/>
      <circle cx="280" cy="280" r="254" fill="none" stroke="rgba(100,160,255,.6)" stroke-width="3"
        stroke-dasharray="0 1675.5" stroke-linecap="round"
        transform="rotate(135 280 280)" id="v1arc"/>
    </svg>
    <div class="temp-val" id="v1val">22°</div>
    <div class="temp-unit">Celsius</div>
    <div class="temp-info">
      <span>Fan<b id="v1fan">Auto</b></span>
      <span>Set<b id="v1set">22°</b></span>
      <span>Dir<b id="v1dir">Auto</b></span>
    </div>
    <div class="swipe-hint">↑↓ swipe to adjust</div>
  </div>

  <!-- V2 HUMIDITY -->
  <div class="view" id="v2">
    <svg class="arc-wrap" viewBox="0 0 560 560" id="v2svg">
      <circle cx="280" cy="280" r="254" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="3"
        stroke-dasharray="1342.2 1675.5" stroke-linecap="round"
        transform="rotate(135 280 280)"/>
      <circle cx="280" cy="280" r="254" fill="none" stroke="rgba(80,200,180,.6)" stroke-width="3"
        stroke-dasharray="0 1675.5" stroke-linecap="round"
        transform="rotate(135 280 280)" id="v2arc"/>
    </svg>
    <div class="hum-wrap">
      <div class="hum-icon" id="v2icon">💧</div>
      <div style="display:flex;align-items:baseline;gap:4px;">
        <div class="hum-val" id="v2val">58</div>
        <div class="hum-unit">%</div>
      </div>
      <div class="hum-status" id="v2status" style="color:#50C8B4;">Comfortable</div>
      <div class="hum-desc" id="v2desc">Ideal indoor humidity</div>
    </div>
  </div>

  <!-- V3 MUSIC -->
  <div class="view" id="v3">
    <div class="blobs">
      <div class="blob"></div>
      <div class="blob"></div>
      <div class="blob"></div>
    </div>
    <div class="lp-wrap" id="v3lp">
      <svg id="lp" viewBox="0 0 216 216">
        <defs>
          <radialGradient id="lpLabel" cx="50%" cy="50%" r="50%">
            <stop offset="0%" id="lpC1" stop-color="#4A9EFF"/>
            <stop offset="100%" id="lpC2" stop-color="#1a1a3e"/>
          </radialGradient>
          <radialGradient id="discGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#1a1a1a"/>
            <stop offset="100%" stop-color="#0a0a0a"/>
          </radialGradient>
        </defs>
        <!-- static progress ring -->
        <circle cx="108" cy="108" r="104" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="2.5"/>
        <circle cx="108" cy="108" r="104" id="v3prog" fill="none"
          stroke="rgba(255,255,255,.35)" stroke-width="2.5" stroke-linecap="round"
          transform="rotate(-90 108 108)"
          stroke-dasharray="653.5 653.5" stroke-dashoffset="490"/>
        <!-- spinning disc -->
        <g id="v3disc">
          <circle cx="108" cy="108" r="86" fill="url(#discGrad)"/>
          <circle cx="108" cy="108" r="80" fill="none" stroke="#1e1e1e" stroke-width=".8"/>
          <circle cx="108" cy="108" r="72" fill="none" stroke="#1b1b1b" stroke-width=".7"/>
          <circle cx="108" cy="108" r="64" fill="none" stroke="#181818" stroke-width=".7"/>
          <circle cx="108" cy="108" r="56" fill="none" stroke="#161616" stroke-width=".6"/>
          <circle cx="108" cy="108" r="48" fill="none" stroke="#141414" stroke-width=".6"/>
          <circle cx="108" cy="108" r="42" fill="none" stroke="#131313" stroke-width=".5"/>
          <!-- label -->
          <circle cx="108" cy="108" r="36" fill="url(#lpLabel)"/>
          <!-- center hole -->
          <circle cx="108" cy="108" r="4.5" fill="#0a0a0a"/>
        </g>
      </svg>
    </div>
    <div class="track-info">
      <div class="track-title" id="v3title">Track Title</div>
      <div class="track-artist" id="v3artist">Artist</div>
      <div class="swipe-hint">↑↓ prev/next · tap LP to play</div>
    </div>
  </div>

  <!-- V4 LIGHTING -->
  <div class="view" id="v4">
    <div class="light-glow" id="v4glow"></div>
    <svg class="arc-wrap" viewBox="0 0 560 560" id="v4svg">
      <circle cx="280" cy="280" r="254" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="3"
        stroke-dasharray="1342.2 1675.5" stroke-linecap="round"
        transform="rotate(135 280 280)"/>
      <!-- mode buttons at arc positions -->
      <!-- angles (from center): Warm=222°, Cold=202°, Sleep=158°, Study=138° (measured from top=0°) -->
      <!-- converted to SVG coords: r=220 from center 280,280 -->
      <g id="v4modes">
        <!-- Warm: bottom-left ~222deg from top = 132deg standard -->
        <g class="mode-btn" id="mb-warm" onclick="setMode('warm')">
          <circle cx="133" cy="427" r="28" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
          <text x="133" y="421" text-anchor="middle" font-size="14" fill="rgba(255,255,255,.4)" font-family="Inter,sans-serif">🔆</text>
          <text x="133" y="433" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.35)" font-family="Inter,sans-serif" letter-spacing=".05em">WARM</text>
        </g>
        <!-- Cold: bottom-left-ish ~202deg = 112deg -->
        <g class="mode-btn" id="mb-cold" onclick="setMode('cold')">
          <circle cx="174" cy="466" r="28" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
          <text x="174" y="460" text-anchor="middle" font-size="14" fill="rgba(255,255,255,.4)" font-family="Inter,sans-serif">❄️</text>
          <text x="174" y="472" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.35)" font-family="Inter,sans-serif" letter-spacing=".05em">COLD</text>
        </g>
        <!-- Sleep: bottom-right-ish ~158deg = 68deg -->
        <g class="mode-btn" id="mb-sleep" onclick="setMode('sleep')">
          <circle cx="386" cy="466" r="28" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
          <text x="386" y="460" text-anchor="middle" font-size="14" fill="rgba(255,255,255,.4)" font-family="Inter,sans-serif">🌙</text>
          <text x="386" y="472" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.35)" font-family="Inter,sans-serif" letter-spacing=".05em">SLEEP</text>
        </g>
        <!-- Study: bottom-right ~138deg = 48deg -->
        <g class="mode-btn" id="mb-study" onclick="setMode('study')">
          <circle cx="427" cy="427" r="28" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
          <text x="427" y="421" text-anchor="middle" font-size="14" fill="rgba(255,255,255,.4)" font-family="Inter,sans-serif">📚</text>
          <text x="427" y="433" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.35)" font-family="Inter,sans-serif" letter-spacing=".05em">STUDY</text>
        </g>
      </g>
    </svg>
    <div class="light-center" id="v4center">
      <div class="light-icon" id="v4icon">💡</div>
      <div class="light-status" id="v4status">Off</div>
      <div class="light-brightness" id="v4bright" style="display:none">75%</div>
      <div class="light-mode-label" id="v4modelabel"></div>
    </div>
  </div>

  <!-- nav dots -->
  <div id="nav">
    <div class="dot on" data-i="0"></div>
    <div class="dot" data-i="1"></div>
    <div class="dot" data-i="2"></div>
    <div class="dot" data-i="3"></div>
    <div class="dot" data-i="4"></div>
  </div>

</div><!-- .screen -->
</div><!-- .bezel -->
</div><!-- #shell -->

<script>
/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */
const VIEWS = ['v0','v1','v2','v3','v4'];
let cur = 0;

/* Temperature state */
const CLIM = {temp:22, min:16, max:30, set:22, fan:'Auto', dir:'Auto'};

/* Humidity state */
const HUM = {val:58};

/* Music state */
const TRACKS = [
  {title:'Midnight City',artist:'M83',c1:'#4A9EFF',c2:'#1a1a3e'},
  {title:'Breathe',artist:'Pink Floyd',c1:'#ff6b9d',c2:'#2a0a1a'},
  {title:'Strobe',artist:'deadmau5',c1:'#b06bff',c2:'#1a0a2e'},
  {title:'Clair de Lune',artist:'Debussy',c1:'#50C8B4',c2:'#0a1e1a'},
  {title:'Redbone',artist:'Childish Gambino',c1:'#ff9f43',c2:'#2a1a00'},
];
let trkIdx = 0;
let playing = false;
let progPct = 0.25;

/* Lighting state */
const MODES = {
  warm:{color:'#ffb347',label:'Warm',brightness:80},
  cold:{color:'#87ceeb',label:'Cold',brightness:90},
  sleep:{color:'#9b59b6',label:'Sleep',brightness:20},
  study:{color:'#4A9EFF',label:'Study',brightness:100},
};
let lightOn = false;
let activeMode = 'warm';

/* ═══════════════════════════════════════════
   CLOCK
═══════════════════════════════════════════ */
function tickClock(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0');
  const m=String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clk').textContent=h+':'+m;
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dat').textContent=days[n.getDay()]+' · '+months[n.getMonth()]+' '+n.getDate();
}
tickClock();
setInterval(tickClock,1000);

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function go(idx){
  if(idx===cur) return;
  const prev=cur;
  cur=idx;
  document.querySelectorAll('.view').forEach((v,i)=>{
    v.classList.remove('act','out');
    if(i===cur) v.classList.add('act');
    else if(i===prev) v.classList.add('out');
  });
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('on',i===cur);
  });
  // nav opacity on clock
  document.getElementById('nav').style.opacity = cur===0 ? '0' : '1';
}
// hide nav dots on clock
document.getElementById('nav').style.opacity='0';

/* ═══════════════════════════════════════════
   ARC HELPERS
═══════════════════════════════════════════ */
const ARC_FULL = 1342.2; // 270/360 * 2*PI*254

function setArc(elId, pct){
  const el = document.getElementById(elId);
  if(!el) return;
  const dash = pct * ARC_FULL;
  el.setAttribute('stroke-dasharray', dash + ' ' + (ARC_FULL + 333));
}

/* ═══════════════════════════════════════════
   V1 TEMPERATURE
═══════════════════════════════════════════ */
function renderClim(){
  document.getElementById('v1val').textContent = CLIM.temp + '°';
  document.getElementById('v1set').textContent = CLIM.set + '°';
  document.getElementById('v1fan').textContent = CLIM.fan;
  document.getElementById('v1dir').textContent = CLIM.dir;
  const pct = (CLIM.temp - CLIM.min) / (CLIM.max - CLIM.min);
  setArc('v1arc', pct);
}
renderClim();

/* ═══════════════════════════════════════════
   V2 HUMIDITY
═══════════════════════════════════════════ */
function humStatus(v){
  if(v < 30) return {label:'Dry',color:'#F0A500',icon:'🌵',desc:'Low humidity · may feel dry',arcColor:'rgba(240,165,0,.6)'};
  if(v < 60) return {label:'Comfortable',color:'#50C8B4',icon:'💧',desc:'Ideal indoor humidity',arcColor:'rgba(80,200,180,.6)'};
  if(v < 80) return {label:'Humid',color:'#4A9EFF',icon:'🌊',desc:'Above average humidity',arcColor:'rgba(74,158,255,.6)'};
  return {label:'Too Humid',color:'#9b59b6',icon:'☔',desc:'Very high humidity',arcColor:'rgba(155,89,182,.6)'};
}
function renderHum(){
  const s = humStatus(HUM.val);
  document.getElementById('v2val').textContent = HUM.val;
  document.getElementById('v2icon').textContent = s.icon;
  document.getElementById('v2status').textContent = s.label;
  document.getElementById('v2status').style.color = s.color;
  document.getElementById('v2desc').textContent = s.desc;
  document.getElementById('v2arc').setAttribute('stroke', s.arcColor);
  setArc('v2arc', HUM.val / 100);
}
renderHum();

/* ═══════════════════════════════════════════
   V3 MUSIC
═══════════════════════════════════════════ */
function renderTrack(){
  const t = TRACKS[trkIdx];
  document.getElementById('v3title').textContent = t.title;
  document.getElementById('v3artist').textContent = t.artist;
  // update LP label colors
  document.getElementById('lpC1').setAttribute('stop-color', t.c1);
  document.getElementById('lpC2').setAttribute('stop-color', t.c2);
  // update blob colors
  const blobs = document.querySelectorAll('#v3 .blob');
  blobs[0].style.background = t.c1;
  blobs[1].style.background = t.c2;
}

function renderPlay(){
  const disc = document.getElementById('v3disc');
  if(playing){
    disc.classList.add('spinning');
  } else {
    disc.classList.remove('spinning');
  }
  // update progress ring
  const C = 2 * Math.PI * 104;
  const offset = C * (1 - progPct);
  document.getElementById('v3prog').setAttribute('stroke-dashoffset', offset);
}

function nextTrk(){
  trkIdx = (trkIdx + 1) % TRACKS.length;
  progPct = 0;
  renderTrack();
  renderPlay();
}
function prevTrk(){
  trkIdx = (trkIdx - 1 + TRACKS.length) % TRACKS.length;
  progPct = 0;
  renderTrack();
  renderPlay();
}
function togglePlay(){
  playing = !playing;
  renderPlay();
}

// LP tap area
document.getElementById('v3lp').addEventListener('click', ()=>{
  if(cur===3) togglePlay();
});

renderTrack();
renderPlay();

/* simulate progress when playing */
setInterval(()=>{
  if(playing && cur===3){
    progPct = Math.min(1, progPct + 0.001);
    if(progPct>=1){ nextTrk(); playing=true; renderPlay(); }
    else {
      const C = 2 * Math.PI * 104;
      document.getElementById('v3prog').setAttribute('stroke-dashoffset', C*(1-progPct));
    }
  }
}, 500);

/* ═══════════════════════════════════════════
   V4 LIGHTING
═══════════════════════════════════════════ */
function setMode(m){
  activeMode = m;
  // highlight active mode button
  Object.keys(MODES).forEach(k=>{
    const btn = document.getElementById('mb-'+k);
    if(!btn) return;
    const circle = btn.querySelector('circle');
    if(k===m){
      circle.setAttribute('fill','rgba(255,255,255,.12)');
      circle.setAttribute('stroke','rgba(255,255,255,.4)');
    } else {
      circle.setAttribute('fill','rgba(255,255,255,.04)');
      circle.setAttribute('stroke','rgba(255,255,255,.1)');
    }
  });
  if(lightOn) renderLight();
}

function toggleLight(){
  lightOn = !lightOn;
  renderLight();
}

function renderLight(){
  const m = MODES[activeMode];
  const glow = document.getElementById('v4glow');
  const status = document.getElementById('v4status');
  const bright = document.getElementById('v4bright');
  const modeLabel = document.getElementById('v4modelabel');
  const icon = document.getElementById('v4icon');
  if(lightOn){
    glow.style.background = m.color;
    glow.classList.add('on');
    status.textContent = 'On';
    bright.style.display = 'block';
    bright.textContent = m.brightness + '%';
    modeLabel.textContent = m.label;
    icon.textContent = '💡';
    // arc glow color
    document.querySelector('#v4svg circle:last-of-type') && null; // just glow
  } else {
    glow.classList.remove('on');
    status.textContent = 'Off';
    bright.style.display = 'none';
    modeLabel.textContent = '';
    icon.textContent = '💡';
  }
}

// center tap = toggle
document.getElementById('v4center').addEventListener('click', ()=>{
  if(cur===4) toggleLight();
});

setMode('warm');

/* ═══════════════════════════════════════════
   SWIPE (FIXED)
   - Horizontal: always navigate between tabs
   - Vertical: context action (temp adjust / track change)
═══════════════════════════════════════════ */
let sx=0, sy=0;
document.getElementById('screen').addEventListener('touchstart',e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
},{passive:true});

document.getElementById('screen').addEventListener('touchend',e=>{
  if(cur===0) return; // clock: no swipe
  const dx=e.changedTouches[0].clientX-sx;
  const dy=e.changedTouches[0].clientY-sy;
  const adx=Math.abs(dx), ady=Math.abs(dy);

  if(adx > ady && adx > 44){
    /* HORIZONTAL = always navigate */
    if(dx<0 && cur<VIEWS.length-1) go(cur+1);
    else if(dx>0 && cur>1) go(cur-1);
  } else if(ady > adx && ady > 44){
    /* VERTICAL = context action */
    if(cur===1){
      /* temperature: up=raise, down=lower */
      const delta = dy<0 ? 1 : -1;
      CLIM.temp = Math.max(CLIM.min, Math.min(CLIM.max, CLIM.temp+delta));
      CLIM.set = CLIM.temp;
      renderClim();
    } else if(cur===3){
      /* music: up=next, down=prev */
      if(dy<0) nextTrk();
      else prevTrk();
    }
  }
},{passive:true});

/* dot tap navigation */
document.querySelectorAll('.dot').forEach(d=>{
  d.addEventListener('click',()=> go(+d.dataset.i));
});

/* clock → tap to go to temp */
document.getElementById('v0').addEventListener('click',()=> go(1));

/* nav fade on clock */
document.addEventListener('touchstart',()=>{
  if(cur===0) document.getElementById('nav').style.opacity='0';
  else document.getElementById('nav').style.opacity='1';
},{passive:true});
</script>
</body>
